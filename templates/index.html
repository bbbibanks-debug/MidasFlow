<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIDASFLOW</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://plot.ly"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #1e1e24; color: #a5a6b5; }
        .dashboard-container { background-color: #13131a; border-radius: 24px; border: 1px solid #23232f; }
        .card-panel { background-color: #1c1c24; border-radius: 16px; border: 1px solid #282836; }
        .input-clean { background-color: #252532; border: 1px solid #323246; color: #ffffff; transition: all 0.2s; }
        .input-clean:focus { border-color: #ccff00; outline: none; }
        .text-lime-neon { color: #ccff00; }
        .bg-lime-neon { background-color: #ccff00; }
        th, td { border-bottom: 1px solid #252533; }
        tr:hover { background-color: #23232f; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">

    <!-- Container Principal Unificado Sem Menu Lateral -->
    <div class="w-full max-w-6xl dashboard-container p-6 md:p-8 flex flex-col overflow-hidden shadow-2xl">
        
        <!-- Topbar com Título Principal Único -->
        <div class="mb-6 flex justify-between items-center">
            <h1 class="text-white text-xl font-bold tracking-tight">Analytics Dashboard</h1>
        </div>

        <!-- Formulários Superiores Integrados -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <!-- Upload -->
            <div class="card-panel p-4 flex items-center justify-between">
                <form action="/" method="POST" enctype="multipart/form-data" class="flex items-center gap-3 w-full">
                    <input type="file" name="file" accept=".xlsx, .xls" required class="input-clean p-1.5 text-xs rounded-xl flex-1 cursor-pointer file:bg-[#323246] file:border-0 file:text-white file:text-[10px] file:px-2.5 file:py-1 file:rounded-lg file:mr-2">
                    <button type="submit" class="bg-lime-neon text-black font-bold px-4 py-2 rounded-xl hover:opacity-90 transition-all text-xs tracking-tight">
                        Upload Sheet
                    </button>
                </form>
            </div>

            <!-- Filtro -->
            <div class="card-panel p-4 flex items-center justify-between {% if not columns %}opacity-20 pointer-events-none{% endif %}">
                <form action="/" method="POST" class="w-full">
                    <select name="target_variable" required onchange="this.form.submit()" class="input-clean w-full p-2.5 rounded-xl text-xs font-semibold text-white">
                        <option value="">-- CHOOSE VARIABLE TARGET --</option>
                        {% for col in columns %}
                        <option value="{{ col }}" {% if col == selected_var %}selected{% endif %}>{{ col }}</option>
                        {% endfor %}
                    </select>
                </form>
            </div>
        </div>

        <!-- Visualização Condicional Sob Demanda -->
        {% if tables and graphs %}
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start flex-1">
            
            <!-- Tabela de Estatísticas -->
            <div class="lg:col-span-5 card-panel p-5">
                <div class="w-full text-zinc-300 overflow-x-auto">
                    {{ tables|safe }}
                </div>
            </div>

            <!-- Painel do Gráfico Limpo -->
            <div class="lg:col-span-7 card-panel p-2 bg-[#1c1c24] flex flex-col justify-center">
                <div class="p-2 bg-[#13131a] rounded-xl flex-1 flex flex-col justify-center min-h-[340px]">
                    {% for graph in graphs %}
                    <div id="graph-{{ loop.index }}" class="w-full h-[320px]"></div>
                    <script>
                        var graphData = {{ graph|safe }};
                        graphData.layout.font.family = "Plus Jakarta Sans";
                        graphData.layout.font.color = "#a5a6b5";
                        if(graphData.data && graphData.data[0]) {
                            graphData.data[0].line = {
                                color: "#ccff00",
                                width: 2.5
                            };
                        }
                        Plotly.newPlot('graph-{{ loop.index }}', graphData.data, graphData.layout, {responsive: true, displayModeBar: false});
                    </script>
                    {% endfor %}
                </div>
            </div>

        </div>
        {% else %}
            <!-- Estado Inicial de Repouso Totalmente Limpo -->
            <div class="border-2 border-dashed border-[#282836] p-12 text-center rounded-2xl bg-[#13131a] flex-1 flex flex-col items-center justify-center gap-2 mt-4">
                <div class="text-xs text-zinc-500 font-semibold uppercase tracking-wider">Awaiting Data Ingestion</div>
                <div class="text-[11px] text-zinc-600 max-w-xs mx-auto">
                    Please upload your spreadsheet and select a data column above to begin computations.
                </div>
            </div>
        {% endif %}
        
    </div>

</body>
</html>
